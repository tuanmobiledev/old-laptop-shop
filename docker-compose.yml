services:
  laprevive-db:
    build:
      context: ./db
      dockerfile: Dockerfile
    image: laprevive-db:latest
    container_name: laprevive-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-laprevive}
      POSTGRES_USER: ${POSTGRES_USER:-laprevive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_strong_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - laprevive_pgdata:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-15432}:5432"

  laprevive-api:
    build:
      context: .
      dockerfile: Dockerfile
      target: api
      args:
        VITE_GA4_MEASUREMENT_ID: ${VITE_GA4_MEASUREMENT_ID:-}
        VITE_ADMIN_TOKEN: ${VITE_ADMIN_TOKEN:-}
    image: laprevive-api:latest
    container_name: laprevive-api
    restart: unless-stopped
    depends_on:
      - laprevive-db
    environment:
      POSTGRES_HOST: laprevive-db
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-laprevive}
      POSTGRES_USER: ${POSTGRES_USER:-laprevive}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_strong_password}
      ADMIN_TOKEN: ${VITE_ADMIN_TOKEN:-change-me-in-production}
      UPLOAD_DIR: /data/uploads
    volumes:
      - laprevive_uploads:/data/uploads

  laprevive-web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_GA4_MEASUREMENT_ID: ${VITE_GA4_MEASUREMENT_ID:-}
        VITE_ADMIN_TOKEN: ${VITE_ADMIN_TOKEN:-}
    image: laprevive-web:latest
    container_name: laprevive-web
    restart: unless-stopped
    depends_on:
      - laprevive-api
    volumes:
      - laprevive_uploads:/usr/share/nginx/html/uploads:ro
    ports:
      - "${APP_PORT:-18080}:80"
    labels:
      - "dokploy.app=laprevive-web"
      - "dokploy.server=coder-tuan"
      - "traefik.enable=true"
      - "traefik.http.middlewares.laprevive-gzip.compress=true"
      - "traefik.http.routers.laprevive-web.entrypoints=http"
      - "traefik.http.routers.laprevive-web.rule=Host(`maytinhthuduc.com`)"
      - "traefik.http.routers.laprevive-web.middlewares=laprevive-gzip"
      - "traefik.http.routers.laprevive-web.service=laprevive-web"
      - "traefik.http.services.laprevive-web.loadbalancer.server.port=80"
      - "traefik.http.routers.laprevive-web-secure.entrypoints=https"
      - "traefik.http.routers.laprevive-web-secure.rule=Host(`maytinhthuduc.com`)"
      - "traefik.http.routers.laprevive-web-secure.middlewares=laprevive-gzip"
      - "traefik.http.routers.laprevive-web-secure.tls=true"
      - "traefik.http.routers.laprevive-web-secure.tls.certresolver=letsencrypt"
      - "traefik.http.routers.laprevive-web-secure.service=laprevive-web"
      - "traefik.http.services.laprevive-web.loadbalancer.server.port=80"

volumes:
  laprevive_pgdata:
  laprevive_uploads:
